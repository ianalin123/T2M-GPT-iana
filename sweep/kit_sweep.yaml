program: /home/malulekevon/motion_latent_space/T2M-GPT-iana/train_vq.py
method: bayes
metric:
  name: Val/TotalLoss
  goal: minimize

# Stop bad runs early
early_terminate:
  type: hyperband
  min_iter: 2
  eta: 3
  s: 2

parameters:
  # Training hyperparameters
  batch_size:
    values: [64, 128, 256]
  
  
  learning_rate:
    distribution: log_uniform_values
    min: 0.00005
    max: 0.001

  gamma:
    distribution: log_uniform_values
    min: 0.05
    max: 0.5

  weight_decay:
    values: [0.0005, 0.001, 0.005]

  depth:
    values: [3, 4]  
  
  code_dim:
    values: [128, 256, 512, 1024]  
  
  nb_code:
    values: [128, 256, 512, 1024]  

  width:
    values: [128, 256, 512, 1024]  
  
  loss_vel:
    distribution: uniform
    min: 0.1
    max: 1.0
  
  commit:
    distribution: uniform
    min: 0.1
    max: 1.0
  dataname:
    value: kit
  vq_act: 
    distribution: categorical
    values: [relu, silu, gelu]
  quantizer:
    value: ema_reset
  recons_loss:
    value: l1_smooth
  mu:
    values: [0.95, 0.97, 0.99]

  lr_scheduler:
    value: [50000, 200000]

cap_run: 150

command:
  - ${env}
  - python
  - ${program}
  - --config
  - config/kit.yaml



