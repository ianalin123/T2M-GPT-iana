name: T2M-GPT
channels:
  - conda-forge
  - pytorch
  - defaults

dependencies:
  - python=3.8
  - pip
  - cudatoolkit=10.1
  - pytorch=1.8.1
  - torchvision=0.9.1
  - torchaudio=0.8.1

  # Core dependencies that SHOULD come from conda
  - numpy=1.20
  - scipy=1.7
  - pandas=1.3
  - scikit-learn=0.24
  - matplotlib=3.4
  - hdbscan=0.8.27          # MUST be from conda, not pip
  - umap-learn=0.5.2        # MUST be from conda
  - cython
  - ffmpeg
  - pillow
  - mkl
  - mkl-service
  - mkl_fft
  - mkl_random

  - pip:
      - absl-py==0.13.0
      - chumpy==0.70
      - imageio==2.9.0
      - ipdb==0.13.9
      - protobuf==3.17.3
      - requests==2.26.0
      - tensorboard==2.6.0
      - tqdm==4.62.2
      - smplx==0.1.28
      - gdown
      - moviepy
      - h5py
      - git+https://github.com/openai/CLIP.git
      - git+https://github.com/nghorbani/human_body_prior
